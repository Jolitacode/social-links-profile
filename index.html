<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social links profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="profile">
        <img src="avatar-jessica.jpeg" alt="Image of jessica" class="profile-image">
        <div>
            <h1>Jessica Randall</h1>
            <address>London, United Kingdom</address>
        </div>
        <p>"Front-end developer and avid reader."</p>
        <ul class="social-links">
            <li><a href="#" class="links">GitHub</a></li>
            <li><a href="#" class="links">Frontend Mentor</a></li>
            <li><a href="#" class="links">LinkedIn</a></li>
            <li><a href="#" class="links">Twitter</a></li>
            <li><a href="#" class="links">Instagram</a></li>
        </ul>
    </main>
    <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io/challenges/social-links-profile-UG32l9m6dQ" target="_blank"
            rel="noopener noreferrer">Frontend Mentor</a>
        Coded by <a href="https://www.frontendmentor.io/profile/Jolitacode" target="_blank"
            rel="noopener noreferrer">Audrey</a>
    </footer>
</body>

</html>
